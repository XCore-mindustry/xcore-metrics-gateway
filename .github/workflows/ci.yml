name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint
        run: uv run ruff check

      - name: Format check
        run: |
          if ! uv run ruff format --check; then
            echo "::warning::Code formatting differs from ruff format output. Run 'uv run ruff format' to auto-fix."
          fi

      - name: Test
        run: uv run pytest -q
